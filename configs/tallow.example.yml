server:
  listen_address: "127.0.0.1:8844"
postgres:
  dsn: "postgres://tallow:tallow@localhost:5432/tallow?sslmode=disable"
nats:
  url: "nats://localhost:4222"
storage:
  root: "./var/tallow/storage"
auth:
  session:
    cookie_name: tallow_session
    ttl: 24h
    secure_cookies: true
    dev_insecure_cookies: false
  local:
    enabled: true
    bootstrap_admin_email: admin@example.com
    bootstrap_admin_password_env: TALLOW_BOOTSTRAP_ADMIN_PASSWORD
  github:
    enabled: false
    client_id: ""
    client_secret_env: TALLOW_GITHUB_CLIENT_SECRET
    callback_url: http://localhost:8844/v1/auth/github/callback
    allowed_orgs: []
    allowed_teams: []
notifications:
  email:
    enabled: false
    smtp_host: localhost
    smtp_port: 1025
    username: ""
    password_ref: TALLOW_SMTP_PASSWORD
    from: tallow@example.com
    to: [ops@example.com]
  teams:
    enabled: false
    webhook_url_ref: TALLOW_TEAMS_WEBHOOK_URL
metrics:
  enabled: true
log:
  level: "info"

scheduler:
  polling_tiers:
    hot: 5m
    warm: 30m
    cold: 12h
    jitter: 30s
    burst_after_release: [5m, 30m, 6h, 24h]
