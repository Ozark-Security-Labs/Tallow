{
  "id": "teams.high_risk_finding",
  "version": "1",
  "description": "Teams card for a high-risk finding requiring review.",
  "compatible_channels": ["teams"],
  "variables":
    {
      "package_name":
        {
          "type": "string",
          "required": true,
          "redaction": "none",
          "description": "Package name"
        },
      "version":
        {
          "type": "string",
          "required": true,
          "redaction": "none",
          "description": "Package version"
        },
      "ecosystem":
        {
          "type": "string",
          "required": true,
          "redaction": "none",
          "description": "Ecosystem"
        },
      "severity":
        {
          "type": "string",
          "required": true,
          "redaction": "none",
          "description": "Severity"
        },
      "rule_ids":
        {
          "type": "string",
          "required": true,
          "redaction": "none",
          "description": "Rule IDs"
        },
      "evidence_url":
        {
          "type": "url",
          "required": true,
          "redaction": "url",
          "description": "Evidence link"
        }
    },
  "targets":
    {
      "teams":
        {
          "card_json": "{\"type\":\"message\",\"attachments\":[{\"contentType\":\"application/vnd.microsoft.card.adaptive\",\"content\":{\"type\":\"AdaptiveCard\",\"version\":\"1.4\",\"body\":[{\"type\":\"TextBlock\",\"weight\":\"Bolder\",\"text\":\"Tallow finding requires review\"},{\"type\":\"FactSet\",\"facts\":[{\"title\":\"Package\",\"value\":\"{{ ecosystem }}/{{ package_name }}\"},{\"title\":\"Version\",\"value\":\"{{ version }}\"},{\"title\":\"Severity\",\"value\":\"{{ severity }}\"},{\"title\":\"Rules\",\"value\":\"{{ rule_ids }}\"},{\"title\":\"Evidence\",\"value\":\"{{ evidence_url }}\"}]}]}}]}"
        }
    }
}
