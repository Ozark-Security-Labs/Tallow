name: Documentation issue
description: Report missing, stale, or confusing documentation.
title: '[docs]: '
labels: ['documentation']
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or describe the affected docs.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
