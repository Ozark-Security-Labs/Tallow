name: Rule request
description: Request a new security rule, invariant, ecosystem check, or detection improvement.
title: '[rule]: '
labels: ['rule-request']
body:
  - type: input
    id: area
    attributes:
      label: Area or ecosystem
      placeholder: authz, session, npm, Rust, Docker, FastAPI, Prisma, ...
    validations:
      required: true
  - type: textarea
    id: invariant
    attributes:
      label: Rule or invariant
      description: What should the tool check?
    validations:
      required: true
  - type: textarea
    id: unsafe
    attributes:
      label: Unsafe or non-compliant example
      render: text
  - type: textarea
    id: safe
    attributes:
      label: Safe or compliant example
      render: text
  - type: textarea
    id: confidence
    attributes:
      label: High-confidence gate
      description: What evidence should be required before this becomes a finding?
