name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  repo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs exist
        run: test -f README.md && test -f AGENTS.md && test -f docs/architecture/overview.md
