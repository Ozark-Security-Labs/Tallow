name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go test ./...
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m pip install jsonschema
      - run: make schema-validate
  generate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - run: make generate-check
  analyzer-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run --project analyzers pytest
      - run: uv run --project analyzers ruff check
      - run: TALLOW_ANALYZER_NETWORK_OFF=1 uv run --project analyzers pytest
      - run: python scripts/lint_fixtures.py testdata/analyzer-fixtures analyzers/tests/fixtures
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
  security-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f docs/security/threat-model.md && test -f docs/security/safe-unpack.md && test -f docs/security/auth.md && test -f docs/security/llm-usage.md
