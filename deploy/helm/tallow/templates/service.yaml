apiVersion: v1
kind: Service
metadata:
  name: {{ include "tallow.fullname" . }}
  labels:
{{ include "tallow.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8844
      name: http
  selector:
    app.kubernetes.io/name: {{ include "tallow.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
