apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tallow.fullname" . }}-storage
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.storage.size }}
{{- if .Values.storage.storageClassName }}
  storageClassName: {{ .Values.storage.storageClassName }}
{{- end }}
