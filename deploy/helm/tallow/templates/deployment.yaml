apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tallow.fullname" . }}-api
  labels:
{{ include "tallow.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "tallow.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tallow.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8844
          envFrom:
            - configMapRef:
                name: {{ include "tallow.fullname" . }}-config
          env:
            - name: TALLOW_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: {{ .Values.postgres.secretKey }}
{{- if and .Values.llm.enabled .Values.llm.provider.existingSecret }}
            - name: TALLOW_LLM_PROVIDER_API_KEY_ENV
              value: TALLOW_LLM_API_KEY
            - name: TALLOW_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.provider.existingSecret }}
                  key: {{ .Values.llm.provider.apiKeyKey }}
{{- end }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          readinessProbe:
            httpGet: { path: /readyz, port: 8844 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8844 }
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: storage
              mountPath: {{ .Values.storage.root }}
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "tallow.fullname" . }}-storage
